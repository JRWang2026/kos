"数据来源：CNKI 学术期刊库（检索日期：2026年1月31日）。采用文献计量学方法，对 197 篇目标文献进行年度分布、类型构成、关键词频次统计，使用 Python (jieba + wordcloud + matplotlib) 完成数据处理与可视化。本页面展示 3 项核心分析：年度发文趋势、文献类型分布、TOP15 高频关键词。\"},\"footer\":{\"copyright\":\"© 2026 KOS — Knowledge Operating System\",\"built\":\"Built with Next.js · Deployed on CloudStudio\",\"github\":\"GitHub\"},\"knowledgeGraph\":{\"title\":\"研究领域知识图谱\",\"subtitle\":\"我的研究兴趣领域之间的关系网络——拖拽节点可交互探索\",\"nodes\":[{\"id\":\"cis\",\"label\":\"竞争情报系统\",\"group\":0},{\"id\":\"patent\",\"label\":\"专利分析\",\"group\":1},{\"id\":\"nlp\",\"label\":\"文本挖掘/NLP\",\"group\":1},{\"id\":\"kg\",\"label\":\"知识图谱\",\"group\":1},{\"id\":\"python\",\"label\":\"Python数据分析\",\"group\":1},{\"id\":\"digimfg\",\"label\":\"制造业数字化\",\"group\":2},{\"id\":\"mes\",\"label\":\"MES系统\",\"group\":2},{\"id\":\"qc\",\"label\":\"质量控制\",\"group\":2},{\"id\":\"cable\",\"label\":\"特种电缆制造\",\"group\":2},{\"id\":\"hse\",\"label\":\"HSE体系管理\",\"group\":3},{\"id\":\"pm\",\"label\":\"项目管理\",\"group\":3},{\"id\":\"qe\",\"label\":\"质量工程\",\"group\":3}],\"edges\":[{\"source\":\"cis\",\"target\":\"patent\",\"label\":\"数据源\"},{\"source\":\"cis\",\"target\":\"nlp\"},{\"source\":\"cis\",\"target\":\"kg\"},{\"source\":\"cis\",\"target\":\"digimfg\"},{\"source\":\"patent\",\"target\":\"nlp\",\"label\":\"文本处理\"},{\"source\":\"nlp\",\"target\":\"kg\",\"label\":\"关系抽取\"},{\"source\":\"nlp\",\"target\":\"python\"},{\"source\":\"patent\",\"target\":\"python\"},{\"source\":\"digimfg\",\"target\":\"mes\"},{\"source\":\"digimfg\",\"target\":\"cable\",\"label\":\"行业场景\"},{\"source\":\"mes\",\"target\":\"qc\"},{\"source\":\"cable\",\"target\":\"qc\",\"label\":\"质量追溯\"},{\"source\":\"qc\",\"target\":\"qe\"},{\"source\":\"qe\",\"target\":\"hse\"},{\"source\":\"hse\",\"target\":\"pm\"},{\"source\":\"mes\",\"target\":\"pm\"},{\"source\":\"digimfg\",\"target\":\"hse\"}]},\"climateCards\":{\"title\":\"目标城市实时气候\",\"subtitle\":\"德国博士目标城市与新西兰移民备选城市的气候实时对比（数据源：Open-Meteo 免费 API）\",\"loading\":\"正在加载气象数据…\",\"error\":\"气象数据加载失败，请稍后刷新重试。\",\"germany\":\"🇩🇪 德国\",\"newZealand\":\"🇳🇿 新西兰\",\"temp\":\"温度\",\"humidity\":\"湿度\",\"wind\":\"风速\",\"feelsLike\":\"体感\",\"precip\":\"降水\",\"weatherCodes\":{\"clear\":\"晴\",\"mostlyClear\":\"大部晴\",\"partlyCloudy\":\"多云\",\"overcast\":\"阴\",\"fog\":\"雾\",\"drizzle\":\"毛毛雨\",\"rain\":\"雨\",\"heavyRain\":\"大雨\",\"snow\":\"雪\",\"showers\":\"阵雨\",\"heavyShowers\":\"大阵雨\",\"thunderstorm\":\"雷暴\"}},\"researchPage\":{\"title\":\"Research Proposal\",\"subtitle\":\"面向德国博士申请的预研究报告 —— 制造业数字化转型中的竞争情报系统\",\"abstract\":\"本研究计划提出一个面向制造业数字化转型的竞争情报系统（Competitive Intelligence System, CIS）框架。传统竞争情报方法依赖人工文献检索与静态报告，难以应对全球供应链重构与产业政策快速演进的双重压力。本研究旨在利用专利文本挖掘、组织知识图谱与 Python 数据分析技术，构建一个半自动化的技术竞争态势感知系统，为特种电缆等行业的中型制造企业提供可操作的情报决策支持。该研究位于信息科学、制造工程与战略管理的交叉领域，目标申请方向为 TU München、RWTH Aachen、TU Berlin 或 Universität Stuttgart 的博士项目。\",\"sections\":[{\"id\":\"background\",\"title\":\"1. 研究背景与动机\",\"content\":\"制造业正处于第四次工业革命（Industrie 4.0）的核心转型期。全球供应链的区域化重组、技术脱钩风险的加剧，以及各国产业政策的战略性回归，使得技术竞争情报（Competitive Technical Intelligence, CTI）从可选工具演变为企业生存的必需品。\\n\\n然而，传统 CTI 实践面临三重瓶颈：（1）数据源孤岛化——专利数据库、学术文献、行业报告、企业公告彼此割裂；（2）分析手段滞后——以人工阅读与 Excel 统计为主，难以应对海量非结构化文本；（3）方法论缺位——缺乏将自然语言处理（NLP）技术系统化整合到制造企业情报工作流中的理论框架。\\n\\n本研究以中国特种电缆制造企业为场景，该行业具有典型的中型制造特征：对德国设备（如 Troester 连续硫化生产线）高度依赖、专利竞争国际化、数字化转型需求迫切但情报能力薄弱。研究者的二十年行业经验（2005—2021 质量与技术管理，2021 至今 HSE 体系与党务综合管理）为深度理解企业情报需求提供了独特视角。\"},{\"id\":\"problem\",\"title\":\"2. 研究问题\",\"content\":\"本研究围绕一个核心问题展开：如何设计和评估一个数据驱动的竞争情报系统，使其能够从专利文献中自动提取技术竞争态势，并服务于中型制造企业的战略决策？\\n\\n该核心问题分解为三个子问题：\\n\\nRQ1（情报获取）：如何从中文专利数据库中高效采集、清洗和结构化多维度技术情报数据（技术分类、发明人网络、权利要求演变、地理分布）？\\n\\nRQ2（情报分析）：哪些自然语言处理与网络分析方法能够从专利文本中提取有意义的技术竞争信号（新兴技术主题识别、竞争对手技术路线追踪、技术空白区域发现）？\\n\\nRQ3（情报呈现）：如何将分析结果以可行动的知识表示形式（交互式知识图谱、自动情报简报）传递给非技术背景的企业决策者？\"},{\"id\":\"literature\",\"title\":\"3. 文献综述与研究空白\",\"content\":\"技术竞争情报的研究可追溯至 Porter (1980) 的竞争战略框架，其后经 Ashton \u0026 Klavans (1997)、Lichtenthaler (2003) 等人的发展，逐步形成以专利分析为核心的方法体系。近年来，随着 NLP 技术的突破，基于 Transformer 架构的专利文本挖掘（如 Lee et al., 2020; Arts et al., 2021）显著提升了技术主题识别的精度。\\n\\n然而，现有文献存在三个显著空白：\\n\\n空白 1：多数研究聚焦于技术密集型大型企业（制药、半导体），对中型制造企业的适用性缺乏验证。中型企业的专利数量少、技术领域集中、分析资源有限，需要不同的方法论设计。\\n\\n空白 2：专利分析与组织知识管理脱节。现有研究将专利视为独立数据源，忽视了它与企业内部知识（工艺文档、设备参数、质量问题记录）的关联价值。\\n\\n空白 3：缺乏面向行动的情报呈现研究。大量工作停留在可视化展示层面，未探讨如何将分析结果转化为企业管理者的决策输入。\\n\\n本研究通过将专利分析嵌入企业知识组织系统（KOS）框架，并设计面向决策者的情报呈现界面，填补上述空白。\"},{\"id\":\"methodology\",\"title\":\"4. 研究方法\",\"content\":\"本研究采用设计科学（Design Science Research）方法论，分四个阶段推进：\\n\\n阶段一：数据基础设施构建\\n- 数据源：中国国家知识产权局（CNIPA）专利数据库、万方数据、CNKI 学术期刊\\n- 技术栈：Python（AKShare / requests 数据采集 + pandas / jieba 数据处理 + scikit-learn / networkx 分析）\\n- 数据管道设计：半自动化 ETL 流程，支持增量更新与数据版本管理\\n\\n阶段二：竞争情报分析引擎开发\\n- 专利文本预处理：分词（jieba）、去停用词、TF-IDF 向量化\\n- 技术主题建模：LDA 主题模型 + BERTopic 对比验证\\n- 发明人合作网络：基于 networkx 的中心性分析与社区检测\\n- 技术路线追踪：时间序列上的技术主题演变分析\\n\\n阶段三：情报呈现界面设计\\n- 交互式知识图谱：D3.js 力导向图展示技术—发明人—专利三元关系\\n- 自动情报简报生成：基于模板的 NLP 摘要生成\\n- 决策仪表盘：关键竞争指标（KCI）实时监控\\n\\n阶段四：实证验证\\n- 案例研究：以潜油特种电缆行业为场景，验证系统的情报价值\\n- 专家评估：邀请企业技术管理人员与竞争情报学者进行效用评估\\n- 可复现性：所有代码与数据集通过 KOS CodeLab（Pyodide WASM）开源发布\"},{\"id\":\"significance\",\"title\":\"5. 预期贡献与意义\",\"content\":\"理论贡献：\\n1. 提出「嵌入型竞争情报系统」（Embedded CIS）概念，将专利分析锚定在企业知识组织框架中，填补 CTI 与知识管理之间的理论空白。\\n2. 为中型制造企业场景定制 NLP 方法论，验证轻量级文本挖掘技术在该场景下的适用边界。\\n\\n实践贡献：\\n1. 开发一套开源、可复现的竞争情报分析工具链，降低中型企业的 CTI 应用门槛。\\n2. 通过 KOS 平台提供交互式情报展示界面，为产学研合作提供展示与交流载体。\\n\\n学术路径规划：\\n- 短期（2026—2027）：完成中文 CSSCI 论文（《情报理论与实践》），确立国内学术地位\\n- 中期（2027—2028）：将方法论扩展至国际语境，投稿 SSCI 期刊（Online Information Review）\\n- 长期（博士阶段）：在德国导师指导下深化理论框架，将研究场景从中国制造扩展至中德制造比较研究\"},{\"id\":\"references\",\"title\":\"6. 核心参考文献\",\"content\":\"Ashton, W. B., \u0026 Klavans, R. A. (1997). Keeping abreast of science and technology. Battelle Press.\\n\\nArts, S., Hou, J., \u0026 Gomez, J. C. (2021). Natural language processing to identify the creation and impact of new technologies in patent text. Research Policy, 50(2), 104144.\\n\\nLee, C., Jeon, D., Ahn, J., \u0026 Kwon, O. (2020). A deep learning-based approach for patent landscaping. Technological Forecasting and Social Change, 155, 119968.\\n\\nLichtenthaler, E. (2003). Third generation management of technology intelligence processes. R\u0026D Management, 33(4), 361–375.\\n\\nPorter, M. E. (1980). Competitive strategy. Free Press.\\n\\nYoon, B., \u0026 Park, Y. (2004). A text-mining-based patent network. Technovation, 24(11), 897–906.\"}]},\"patentPage\":{\"totalPatents\":\"有效专利\",\"totalInventors\":\"发明人\",\"collaborations\":\"合作关系\",\"techAreas\":\"技术领域\",\"wordCloud\":\"技术关键词云\",\"techDist\":\"技术领域分布\",\"patentType\":\"专利类型统计\",\"yearTrend\":\"年度申请趋势\",\"networkTitle\":\"发明人合作网络\",\"patentList\":\"专利明细列表\",\"loading\":\"正在加载数据...\",\"error\":\"数据加载失败，请刷新重试\",\"title\":\"专利名称\",\"inventors\":\"发明人\",\"type\":\"类型\",\"year\":\"年份\",\"pubno\":\"公开号\",\"certs\":\"专利证书\",\"certView\":\"查看大图\",\"certClose\":\"关闭\",\"certOf\":\"/\",\"inventionPatents\":\"发明专利 Invention Patents\",\"utilityModels\":\"实用新型 Utility Models\",\"invention\":\"发明\",\"utility\":\"实用新型\",\"manageCerts\":\"管理证书\",\"manageUnlock\":\"点击解锁管理面板\",\"managePassword\":\"请输入管理密码\",\"manageEnter\":\"进入\",\"manageWrongPassword\":\"密码错误，请重试\",\"manageUpload\":\"点击上传证书图片\",\"manageLabel\":\"标签类型\",\"manageReset\":\"恢复默认\",\"manageSave\":\"保存设置\",\"manageDone\":\"退出管理\",\"manageTitle\":\"证书管理面板\",\"manageHelp\":\"点击图片区域上传新图片 · 选择标签类型 · 点击保存生效\",\"manageDrag\":\"拖拽调整顺序\",\"manageRemove\":\"清除此证书\"},\"workingPapers\":{\"title\":\"工作论文\",\"subtitle\":\"进行中的学术写作项目。这是一个活的列表，随着研究推进逐步更新。\",\"statusLabel\":{\"concept\":\"构思\",\"drafting\":\"写作中\",\"submitted\":\"审稿中\",\"published\":\"已发表\"},\"papers\":[{\"id\":\"patent-ci\",\"title\":\"基于专利文本挖掘的制造业企业技术竞争情报分析\",\"desc\":\"以专利数据库为数据源，运用 Python 文本挖掘与可视化技术，构建制造业技术竞争态势分析方法。目标期刊：SSCI（Online Information Review）或 CSSCI（情报理论与实践）。此为申博核心论文。\",\"status\":\"concept\",\"target\":\"目标：SSCI Q3 / CSSCI\"},{\"id\":\"gdp-stock\",\"title\":\"宏观经济指标与资本市场联动效应分析：多国比较视角\",\"desc\":\"基于课程作业的技术框架（World Bank API + AKShare 多源数据管道 + Streamlit 交互应用），需完全替换真实股市数据、扩展时间序列至20+年、升级方法论（Granger 因果 + VAR 模型）。待核心论文完成后启动。\",\"status\":\"concept\",\"target\":\"目标：CSSCI / 省级CN\"},{\"id\":\"softwarex\",\"title\":\"KOS: A Browser-Based Python Code Lab for Research Reproducibility in Competitive Intelligence\",\"desc\":\"介绍 KOS 平台的 CodeLab 模块——基于 Pyodide WASM 技术的浏览器端 Python 执行环境，支持科研脚本的即时复现。目标期刊：SoftwareX（SCI JCR Q2, IF~3）。\",\"status\":\"concept\",\"target\":\"目标：SoftwareX (SCI Q2)\"},{\"id\":\"mes-trace\",\"title\":\"面向特种电缆连续硫化生产线的数据追溯系统架构设计\",\"desc\":\"以 Troester 生产线调试经验为基础，设计制造执行系统（MES）中的数据采集与质量追溯方案，结合工业4.0框架讨论中小型制造企业的数字化转型路径。\",\"status\":\"concept\",\"target\":\"目标：中文核心 / 国际会议\"}]}}}]}],\"$L6\"]}],[\"$L7\"],\"$L8\"]}],{},null,false,null]},null,false,\"$@9\"]},null,false,null],\"$La\",false]],\"m\":\"$undefined\",\"G\":[\"$b\",[\"$Lc\"]],\"S\":true,\"h\":null,\"s\":\"$undefined\",\"l\":\"$undefined\",\"p\":\"$undefined\",\"d\":\"$undefined\",\"b\":\"B7bT8LqLZwW9la7vpX9D0\"}\n"])</script><script>self.__next_f.push([1,"d:I[97367,[\"/_next/static/chunks/05-c3ty_6dwfk.js\",\"/_next/static/chunks/35ip4ctshr802.js\"],\"OutletBoundary\"]\ne:\"$Sreact.suspense\"\n11:I[97367,[\"/_next/static/chunks/05-c3ty_6dwfk.js\",\"/_next/static/chunks/35ip4ctshr802.js\"],\"ViewportBoundary\"]\n13:I[97367,[\"/_next/static/chunks/05-c3ty_6dwfk.js\",\"/_next/static/chunks/35ip4ctshr802.js\"],\"MetadataBoundary\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"footer\",null,{\"className\":\"footer\",\"children\":[[\"$\",\"div\",null,{\"className\":\"footer-identity\",\"children\":[[\"$\",\"a\",null,{\"href\":\"mailto:WJR2026@hotmail.com\",\"className\":\"footer-link\",\"children\":[[\"$\",\"svg\",null,{\"width\":\"16\",\"height\":\"16\",\"viewBox\":\"0 0 24 24\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"strokeWidth\":\"2\",\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"children\":[[\"$\",\"path\",null,{\"d\":\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"}],[\"$\",\"polyline\",null,{\"points\":\"22,6 12,13 2,6\"}]]}],\"WJR2026@hotmail.com\"]}],[\"$\",\"a\",null,{\"href\":\"ht
